<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | JDSF Engraving</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" id="siteHeader">
      <div class="container nav-wrap">
        <a class="logo" href="index.html">JDSF</a>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">☰</button>
        <nav class="nav" id="navMenu">
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="about.html">About Us</a>
          <a href="contact.html" class="active">Contact</a>
          <a class="btn btn-primary btn-nav" href="contact.html">Get a Quote</a>
        </nav>
      </div>
    </header>

    <main class="subpage-main">
      <section class="section section-tight">
        <div class="container contact-grid">
          <div class="reveal">
            <p class="eyebrow">Contact</p>
            <h1>Let's Start Your Custom Piece</h1>
            <p>Email: hello@jdsfengraving.com</p>
            <p>Phone: +1 (555) 010-2026</p>
            <div class="map-placeholder">Map Placeholder</div>
          </div>
          <form class="contact-form card reveal">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Your full name" required />

            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required />

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" placeholder="Tell us what you'd like engraved..." required></textarea>

            <button class="btn btn-primary" type="submit">Send Message</button>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <div><a class="logo" href="index.html">JDSF</a></div>
        <div><h4>Quick Links</h4><ul><li><a href="index.html">Home</a></li><li><a href="shop.html">Shop</a></li><li><a href="about.html">About</a></li><li><a href="contact.html">Contact</a></li></ul></div>
        <div><h4>Social</h4><div class="socials"><a href="#">IG</a><a href="#">FB</a><a href="#">IN</a></div></div>
      </div>
      <div class="copyright">© 2026 JDSF Engraving. All rights reserved.</div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
